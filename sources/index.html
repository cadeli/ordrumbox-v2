<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta http-equiv="Content-Language" content="en">
    <meta name="viewport"
        content="minimal-ui, width=device-width, initial-scale=1, maximum-scale=10, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Online Drum Machine, web app: orDrumbox </title>
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    <link rel="canonical" href="https://www.ordrumbox.com/">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --primary: #ff5e00;
            --secondary: #111;
            --bg-light: #f8f8f8;
            --text-light: #fff;
            --text-dark: #111;
            --radius: 10px;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Poppins", Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(120deg, #111, #333);
            color: var(--text-light);
            text-align: center;
            padding: 2rem 1rem;
        }

        header img {
            max-width: 120px;
            margin-top: 1rem;
            filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.2));
        }

        .hero {
            background: url("https://www.ordrumbox.com/jsdrumbox/assets/images/ordrumbox free software drum machine.png?auto=format&fit=crop&w=2000&q=80") no-repeat center/cover;
            color: white;
            text-align: center;
            padding: 6rem 1rem;
            position: relative;
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 2.8rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .buttons a {
            background: var(--primary);
            color: white;
            padding: 0.9rem 1.8rem;
            border-radius: var(--radius);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .buttons a:hover {
            background: #ff7f32;
            transform: translateY(-3px);
        }

        main {
            max-width: 1100px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        section {
            background: white;
            border-radius: var(--radius);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

        section h2 {
            color: var(--primary);
            border-left: 5px solid var(--primary);
            padding-left: 10px;
            margin-bottom: 1rem;
        }

        .features {
            columns: 2;
            column-gap: 2rem;
        }

        .features li {
            margin-bottom: 0.5rem;
        }

        .features-explanation {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .feature-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .feature-card h3 {
            color: var(--primary);
            margin-bottom: 0.8rem;
        }

        .feature-card ul {
            padding-left: 1.2rem;
            margin-top: 0.5rem;
        }

        iframe {
            width: 100%;
            height: 315px;
            border: none;
            border-radius: var(--radius);
            margin: 1rem 0;
        }

        footer {
            background: var(--secondary);
            color: var(--text-light);
            text-align: center;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        footer img {
            width: 60px;
            height: auto;
            filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.2));
        }

        footer a {
            color: #ffb86c;
            text-decoration: none;
            font-weight: 500;
        }

        footer a:hover {
            color: #fff;
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            .features {
                columns: 1;
            }
        }
    </style>


    <script type="text/javascript" src="./mfglobals.js"></script>
    <script defer type="module" src="./main.js"></script>
</head>

<body>
    <div id="insert-ordrumbox-v2-here"></div>
    <header>
        <h1>OrDrumbox: Free Online Drum Machine</h1>
        <img src="assets/images/ordrumbox-logo-prop3.png" alt="OrDrumbox Logo">
    </header>

  
    <main>
        <section>
         
        </section>

    </main>

    <footer>
        <a href="https://www.ordrumbox.com/video-tutorial-ordrumbox.html">
            <img src="assets/images/logo.png" alt="OrDrumbox Logo">
        </a>
        <p>orDrumbox is an open-source project (GPL V3) on <a href="https://github.com/cadeli/ordrumbox-v2">GitHub</a>
        </p>
        <p>© 2026 OrDrumbox Team</p>
    </footer>
</body>

</html>
